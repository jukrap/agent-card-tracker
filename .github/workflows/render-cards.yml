name: Render usage cards

on:
  schedule:
    - cron: '27 15 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'cards/**'

permissions:
  contents: read

concurrency:
  group: render-cards-main
  cancel-in-progress: false

jobs:
  render:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run source quality gate
        shell: bash
        run: |
          set -euo pipefail
          npm run check:syntax
          npm test
          npm run validate

      - name: Resolve render context
        shell: bash
        run: |
          set -euo pipefail
          render_instant="$(node --input-type=module -e 'process.stdout.write(new Date().toISOString())')"
          node scripts/resolve-render-context.mjs --instant "$render_instant" >> "$GITHUB_ENV"

      - name: Render and verify public cards
        shell: bash
        run: |
          set -euo pipefail
          npm run render -- --as-of "$CARD_AS_OF" --as-of-instant "$CARD_AS_OF_INSTANT"
          npm run validate
          npm run check:determinism -- --as-of "$CARD_AS_OF" --as-of-instant "$CARD_AS_OF_INSTANT"

      - name: Publish rendered cards
        env:
          RENDER_PUSH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          stage_cards() {
            git add -- cards/overview.svg cards/trends.svg cards/activity.svg
          }

          push_cards() {
            git -c credential.helper= \
              -c 'credential.helper=!f() { echo username=x-access-token; echo password=$RENDER_PUSH_TOKEN; }; f' \
              push origin HEAD:main
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          stage_cards
          if git diff --cached --quiet; then
            echo "Cards are already current."
            exit 0
          fi
          git commit -m "chore(cards): 사용량 카드 갱신"

          for attempt in 1 2 3; do
            if push_cards; then
              echo "Published cards on attempt ${attempt}."
              exit 0
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "Card publish failed after three attempts." >&2
              exit 1
            fi

            git fetch --no-tags origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Card publish stopped because the latest main could not be rebased safely." >&2
              exit 1
            fi

            npm ci --ignore-scripts
            npm run check:syntax
            npm test
            npm run validate
            npm run render -- --as-of "$CARD_AS_OF" --as-of-instant "$CARD_AS_OF_INSTANT"
            npm run validate
            npm run check:determinism -- --as-of "$CARD_AS_OF" --as-of-instant "$CARD_AS_OF_INSTANT"

            stage_cards
            ahead_count="$(git rev-list --count origin/main..HEAD)"
            if git diff --cached --quiet; then
              if [[ "$ahead_count" -eq 0 ]]; then
                echo "Latest main already contains the rendered cards."
                exit 0
              fi
            elif [[ "$ahead_count" -eq 0 ]]; then
              git commit -m "chore(cards): 사용량 카드 갱신"
            else
              git commit --amend --no-edit
            fi
          done

name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'cards/**'
  pull_request:
    paths-ignore:
      - 'cards/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check JavaScript syntax
        run: npm run check:syntax

      - name: Run tests
        run: npm test

      - name: Validate public artifacts
        run: npm run validate

      - name: Resolve render context
        shell: bash
        run: |
          set -euo pipefail
          render_instant="$(node --input-type=module -e 'process.stdout.write(new Date().toISOString())')"
          node scripts/resolve-render-context.mjs --instant "$render_instant" >> "$GITHUB_ENV"

      - name: Check deterministic rendering
        run: npm run check:determinism -- --as-of "$CARD_AS_OF" --as-of-instant "$CARD_AS_OF_INSTANT"

<text class="value" x="696" y="94">≥6.37B</text>
<text class="meta" x="696" y="109">Partial</text>
<line class="divider" x1="16" y1="121" x2="830" y2="121"/>
<text class="label" x="16" y="140">Source share · 30 days</text>
<rect class="bar-track state-partial" x="16" y="149" width="397" height="7" rx="3"/>

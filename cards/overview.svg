<rect class="bar-track" x="425" y="149" width="405" height="7" rx="3"/>
<rect class="mix-input" x="425" y="149" width="12.56" height="7"/>
<rect class="mix-output" x="437.56" y="149" width="1.17" height="7"/>
<rect class="mix-cache-read" x="438.73" y="149" width="391.27" height="7"/>
<text class="meta" x="425" y="171">Input ≥198M · Output ≥18.4M · Cache ≥6.16B</text>

<text class="value" x="224" y="91">7.88B</text>
<text class="meta" x="224" y="108">2026-07-18 → 2026-07-24</text>
<text class="label" x="16" y="136">BEST 30-DAY RUN</text>
<text class="value" x="16" y="161">14.4B</text>
<text class="meta" x="16" y="178">2026-06-25 → 2026-07-24</text>
<text class="label" x="224" y="136">BEST FULL MONTH</text>
<text class="value" x="224" y="161">3.27B</text>
<text class="meta" x="224" y="178">2026-06</text>
